<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>oNeura - Neural Molecular Dynamics</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0a0a0f;
            color: #e0e0e0;
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            overflow: hidden;
        }

        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        #ui-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        .panel {
            background: rgba(10, 15, 25, 0.85);
            border: 1px solid rgba(100, 180, 255, 0.2);
            border-radius: 8px;
            padding: 12px;
            backdrop-filter: blur(10px);
        }

        #stats-panel {
            position: absolute;
            top: 16px;
            left: 16px;
            width: 280px;
            pointer-events: auto;
        }

        #brain-panel {
            position: absolute;
            top: 16px;
            right: 16px;
            width: 200px;
            pointer-events: auto;
        }

        #controls-panel {
            position: absolute;
            bottom: 16px;
            left: 16px;
            width: 280px;
            pointer-events: auto;
        }

        h2 {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #64b4ff;
            margin-bottom: 12px;
            border-bottom: 1px solid rgba(100, 180, 255, 0.3);
            padding-bottom: 6px;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            margin: 6px 0;
            font-size: 12px;
        }

        .stat-label { color: #808090; }
        .stat-value { color: #00ff88; font-weight: bold; }
        .stat-value.warning { color: #ffaa00; }
        .stat-value.danger { color: #ff4466; }

        .brain-region {
            display: flex;
            align-items: center;
            margin: 4px 0;
            font-size: 10px;
        }

        .region-name {
            width: 50px;
            color: #808090;
        }

        .region-bar-container {
            flex: 1;
            height: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            overflow: hidden;
            margin: 0 8px;
        }

        .region-bar {
            height: 100%;
            background: linear-gradient(90deg, #00ff88, #64b4ff);
            border-radius: 4px;
            transition: width 0.1s ease;
        }

        .region-value {
            width: 30px;
            text-align: right;
            color: #00ff88;
        }

        button {
            background: rgba(100, 180, 255, 0.15);
            border: 1px solid rgba(100, 180, 255, 0.4);
            color: #64b4ff;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.2s;
            margin: 4px;
        }

        button:hover {
            background: rgba(100, 180, 255, 0.3);
            border-color: #64b4ff;
        }

        button.active {
            background: rgba(0, 255, 136, 0.2);
            border-color: #00ff88;
            color: #00ff88;
        }

        .slider-container {
            margin: 8px 0;
        }

        .slider-label {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            margin-bottom: 4px;
        }

        input[type="range"] {
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            outline: none;
            -webkit-appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            background: #64b4ff;
            border-radius: 50%;
            cursor: pointer;
        }

        #loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0a0f;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: opacity 0.5s;
        }

        #loading.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loader {
            width: 60px;
            height: 60px;
            border: 3px solid rgba(100, 180, 255, 0.2);
            border-top-color: #64b4ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        #loading-text {
            margin-top: 20px;
            color: #64b4ff;
            font-size: 14px;
            letter-spacing: 2px;
        }

        .fly-agent {
            position: absolute;
            font-size: 20px;
            transform: translate(-50%, -50%);
            transition: transform 0.05s linear;
        }
    </style>
</head>
<body>
    <div id="loading">
        <div class="loader"></div>
        <div id="loading-text">INITIALIZING oNeura</div>
    </div>

    <div id="canvas-container"></div>

    <div id="ui-overlay">
        <div id="stats-panel" class="panel">
            <h2>Simulation Stats</h2>
            <div class="stat-row">
                <span class="stat-label">Particles</span>
                <span class="stat-value" id="stat-particles">0</span>
            </div>
            <div class="stat-row">
                <span class="stat-label">Temperature</span>
                <span class="stat-value" id="stat-temp">0 K</span>
            </div>
            <div class="stat-row">
                <span class="stat-label">Kinetic E</span>
                <span class="stat-value" id="stat-ke">0</span>
            </div>
            <div class="stat-row">
                <span class="stat-label">Potential E</span>
                <span class="stat-value" id="stat-pe">0</span>
            </div>
            <div class="stat-row">
                <span class="stat-label">Total E</span>
                <span class="stat-value" id="stat-total">0</span>
            </div>
            <div class="stat-row">
                <span class="stat-label">FPS</span>
                <span class="stat-value" id="stat-fps">0</span>
            </div>
            <div class="stat-row">
                <span class="stat-label">Step</span>
                <span class="stat-value" id="stat-step">0</span>
            </div>
        </div>

        <div id="brain-panel" class="panel">
            <h2>Brain Activity</h2>
            <div id="brain-regions"></div>
        </div>

        <div id="controls-panel" class="panel">
            <h2>Controls</h2>
            <div>
                <button id="btn-play">Play</button>
                <button id="btn-pause">Pause</button>
                <button id="btn-reset">Reset</button>
            </div>
            <div class="slider-container">
                <div class="slider-label">
                    <span>Speed</span>
                    <span id="val-speed">1x</span>
                </div>
                <input type="range" id="slider-speed" min="0.1" max="5" step="0.1" value="1">
            </div>
            <div class="slider-container">
                <div class="slider-label">
                    <span>Temperature</span>
                    <span id="val-temp">300K</span>
                </div>
                <input type="range" id="slider-temp" min="100" max="500" step="10" value="300">
            </div>
            <div class="slider-container">
                <div class="slider-label">
                    <span>Particle Size</span>
                    <span id="val-psize">1.0</span>
                </div>
                <input type="range" id="slider-psize" min="0.1" max="3" step="0.1" value="1">
            </div>
            <div class="slider-container">
                <div class="slider-label">
                    <span>Camera Distance</span>
                    <span id="val-cam">50</span>
                </div>
                <input type="range" id="slider-cam" min="10" max="200" step="5" value="50">
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        // ============================================================
        // oNeura WebGPU Visualization
        // ============================================================

        const BRAIN_REGIONS = [
            'AL', 'MB_KC', 'MBON', 'DAN', 'CX',
            'OL_LAM', 'OL_MED', 'OL_LOB', 'LH', 'SEZ',
            'SUP', 'DN', 'VNC', 'NEUROMOD', 'OTHER'
        ];

        // State
        let scene, camera, renderer, controls;
        let particles, particleGeometry, particleMaterial;
        let flyAgents = [];
        let foodMarkers = [];

        let simState = {
            positions: [],
            velocities: [],
            agents: [],
            stats: { temperature: 300, kinetic_energy: 0, potential_energy: 0, total_energy: 0 },
            brain_activity: new Array(15).fill(0),
            step: 0
        };

        let isPlaying = true;
        let simSpeed = 1;
        let particleScale = 1;
        let lastFrameTime = performance.now();
        let frameCount = 0;
        let fps = 60;

        // Socket.IO for live connection (optional)
        let socket = null;

        // ============================================================
        // Initialization
        // ============================================================

        function init() {
            // Scene
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a0a0f);
            scene.fog = new THREE.FogExp2(0x0a0a0f, 0.008);

            // Camera
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 40, 60);

            // Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            // Controls
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.target.set(25, 0, 25);

            // Lighting
            const ambientLight = new THREE.AmbientLight(0x404060, 0.5);
            scene.add(ambientLight);

            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
            directionalLight.position.set(50, 50, 50);
            scene.add(directionalLight);

            const pointLight1 = new THREE.PointLight(0x64b4ff, 0.5, 100);
            pointLight1.position.set(0, 30, 0);
            scene.add(pointLight1);

            // Grid
            const gridHelper = new THREE.GridHelper(100, 50, 0x1a1a2e, 0x1a1a2e);
            gridHelper.position.y = -0.1;
            scene.add(gridHelper);

            // Initialize particles
            initParticles(2000);

            // Initialize brain regions UI
            initBrainRegionsUI();

            // Initialize food sources
            initFoodSources();

            // Event listeners
            window.addEventListener('resize', onWindowResize);
            initControls();

            // Start animation
            animate();

            // Hide loading
            setTimeout(() => {
                document.getElementById('loading').classList.add('hidden');
            }, 500);
        }

        function initParticles(count) {
            // Create instanced geometry for particles
            const sphereGeo = new THREE.SphereGeometry(0.3, 8, 6);

            // Color-based material with vertex colors
            particleMaterial = new THREE.MeshPhongMaterial({
                color: 0x00ff88,
                emissive: 0x003322,
                shininess: 50,
                transparent: true,
                opacity: 0.85
            });

            particles = new THREE.InstancedMesh(sphereGeo, particleMaterial, count);

            // Initialize particle positions
            const dummy = new THREE.Object3D();
            const colors = [];

            for (let i = 0; i < count; i++) {
                dummy.position.set(
                    Math.random() * 50,
                    Math.random() * 10,
                    Math.random() * 50
                );
                dummy.updateMatrix();
                particles.setMatrixAt(i, dummy.matrix);

                // Random color variation
                const color = new THREE.Color();
                color.setHSL(0.4 + Math.random() * 0.1, 0.8, 0.5);
                particles.setColorAt(i, color);
            }

            particles.instanceMatrix.needsUpdate = true;
            particles.instanceColor.needsUpdate = true;

            scene.add(particles);

            // Store initial data
            simState.positions = new Float32Array(count * 3);
            simState.velocities = new Float32Array(count * 3);

            for (let i = 0; i < count; i++) {
                const i3 = i * 3;
                simState.positions[i3] = Math.random() * 50;
                simState.positions[i3 + 1] = Math.random() * 10;
                simState.positions[i3 + 2] = Math.random() * 50;
            }

            document.getElementById('stat-particles').textContent = count;
        }

        function initBrainRegionsUI() {
            const container = document.getElementById('brain-regions');
            container.innerHTML = '';

            BRAIN_REGIONS.forEach((region, i) => {
                const div = document.createElement('div');
                div.className = 'brain-region';
                div.innerHTML = `
                    <span class="region-name">${region}</span>
                    <div class="region-bar-container">
                        <div class="region-bar" id="region-bar-${i}" style="width: 0%"></div>
                    </div>
                    <span class="region-value" id="region-val-${i}">0.0</span>
                `;
                container.appendChild(div);
            });
        }

        function initFoodSources() {
            // Add some food sources
            const foodPositions = [
                [15, 20, 0.5],
                [40, 35, 0.3],
                [30, 10, 0.4]
            ];

            foodPositions.forEach(([x, y, r]) => {
                // Visual marker
                const geo = new THREE.SphereGeometry(r * 2, 16, 12);
                const mat = new THREE.MeshPhongMaterial({
                    color: 0xff6644,
                    emissive: 0x331100,
                    transparent: true,
                    opacity: 0.8
                });
                const food = new THREE.Mesh(geo, mat);
                food.position.set(x, r, y);
                scene.add(food);

                // Glow
                const glowGeo = new THREE.SphereGeometry(r * 3, 12, 8);
                const glowMat = new THREE.MeshBasicMaterial({
                    color: 0xff4422,
                    transparent: true,
                    opacity: 0.2
                });
                const glow = new THREE.Mesh(glowGeo, glowMat);
                glow.position.copy(food.position);
                scene.add(glow);

                foodMarkers.push({ x, y, r, mesh: food, glow });
            });
        }

        // ============================================================
        // Controls
        // ============================================================

        function initControls() {
            document.getElementById('btn-play').addEventListener('click', () => {
                isPlaying = true;
                document.getElementById('btn-play').classList.add('active');
                document.getElementById('btn-pause').classList.remove('active');
            });

            document.getElementById('btn-pause').addEventListener('click', () => {
                isPlaying = false;
                document.getElementById('btn-pause').classList.add('active');
                document.getElementById('btn-play').classList.remove('active');
            });

            document.getElementById('btn-reset').addEventListener('click', resetSimulation);

            document.getElementById('slider-speed').addEventListener('input', (e) => {
                simSpeed = parseFloat(e.target.value);
                document.getElementById('val-speed').textContent = simSpeed.toFixed(1) + 'x';
            });

            document.getElementById('slider-temp').addEventListener('input', (e) => {
                const temp = parseFloat(e.target.value);
                document.getElementById('val-temp').textContent = temp + 'K';
                simState.stats.temperature = temp;
            });

            document.getElementById('slider-psize').addEventListener('input', (e) => {
                particleScale = parseFloat(e.target.value);
                document.getElementById('val-psize').textContent = particleScale.toFixed(1);
            });

            document.getElementById('slider-cam').addEventListener('input', (e) => {
                const dist = parseFloat(e.target.value);
                document.getElementById('val-cam').textContent = dist;
                camera.position.setLength(dist);
            });

            // Start with play active
            document.getElementById('btn-play').classList.add('active');
        }

        function resetSimulation() {
            const count = simState.positions.length / 3;

            for (let i = 0; i < count; i++) {
                const i3 = i * 3;
                simState.positions[i3] = Math.random() * 50;
                simState.positions[i3 + 1] = Math.random() * 10;
                simState.positions[i3 + 2] = Math.random() * 50;
            }

            simState.step = 0;
            updateParticlePositions();
        }

        // ============================================================
        // Simulation
        // ============================================================

        function simulateStep() {
            if (!isPlaying) return;

            const count = simState.positions.length / 3;
            const speed = simSpeed;

            // Simulate particle physics
            for (let i = 0; i < count; i++) {
                const i3 = i * 3;

                // Simple Brownian motion with drift toward food
                let dx = 0, dy = 0, dz = 0;

                // Attraction to nearest food
                let nearestDist = Infinity;
                let nearestFood = null;

                foodMarkers.forEach(food => {
                    const pdx = food.x - simState.positions[i3];
                    const pdy = food.y - simState.positions[i3 + 2];
                    const dist = Math.sqrt(pdx * pdx + pdy * pdy);

                    if (dist < nearestDist) {
                        nearestDist = dist;
                        nearestFood = food;
                    }
                });

                if (nearestFood && nearestDist < 20 && nearestDist > 1) {
                    const force = 0.01 * speed;
                    dx = ((nearestFood.x - simState.positions[i3]) / nearestDist) * force;
                    dy = -0.005 * speed; // Slight downward
                    dz = ((nearestFood.y - simState.positions[i3 + 2]) / nearestDist) * force;
                }

                // Brownian motion
                dx += (Math.random() - 0.5) * 0.1 * speed;
                dy += (Math.random() - 0.5) * 0.1 * speed - 0.002; // slight gravity
                dz += (Math.random() - 0.5) * 0.1 * speed;

                // Update velocity
                simState.velocities[i3] += dx;
                simState.velocities[i3 + 1] += dy;
                simState.velocities[i3 + 2] += dz;

                // Damping
                const damping = 0.98;
                simState.velocities[i3] *= damping;
                simState.velocities[i3 + 1] *= damping;
                simState.velocities[i3 + 2] *= damping;

                // Update position
                simState.positions[i3] += simState.velocities[i3];
                simState.positions[i3 + 1] += simState.velocities[i3 + 1];
                simState.positions[i3 + 2] += simState.velocities[i3 + 2];

                // Bounds
                if (simState.positions[i3] < 0) simState.positions[i3] = 50;
                if (simState.positions[i3] > 50) simState.positions[i3] = 0;
                if (simState.positions[i3 + 1] < 0) simState.positions[i3 + 1] = 0;
                if (simState.positions[i3 + 1] > 15) simState.positions[i3 + 1] = 15;
                if (simState.positions[i3 + 2] < 0) simState.positions[i3 + 2] = 50;
                if (simState.positions[i3 + 2] > 50) simState.positions[i3 + 2] = 0;
            }

            // Simulate brain activity based on proximity to food
            const brainActivity = new Array(15).fill(0);

            foodMarkers.forEach((food, foodIdx) => {
                const proximity = Math.max(0, 1 - (nearestDist || 10) / 20);

                // AL activates near food
                brainActivity[0] = Math.max(brainActivity[0], proximity);
                // MB activates when detecting
                brainActivity[1] = Math.max(brainActivity[1], proximity * 0.8);
                // CX for navigation
                brainActivity[4] = Math.max(brainActivity[4], proximity * 0.3);
            });

            // Add some noise for realism
            for (let i = 0; i < 15; i++) {
                brainActivity[i] = Math.max(0, brainActivity[i] + (Math.random() - 0.5) * 0.1);
                brainActivity[i] = Math.min(1, brainActivity[i]);
            }

            simState.brain_activity = brainActivity;
            simState.step++;

            // Update stats
            updateStats();
            updateBrainUI();
        }

        function updateParticlePositions() {
            const count = simState.positions.length / 3;
            const dummy = new THREE.Object3D();

            for (let i = 0; i < count; i++) {
                const i3 = i * 3;

                dummy.position.set(
                    simState.positions[i3],
                    simState.positions[i3 + 1],
                    simState.positions[i3 + 2]
                );

                // Scale based on velocity
                const vel = Math.sqrt(
                    simState.velocities[i3] ** 2 +
                    simState.velocities[i3 + 1] ** 2 +
                    simState.velocities[i3 + 2] ** 2
                );
                const scale = particleScale * (0.5 + Math.min(vel * 2, 1.5));
                dummy.scale.setScalar(scale);

                dummy.updateMatrix();
                particles.setMatrixAt(i, dummy.matrix);
            }

            particles.instanceMatrix.needsUpdate = true;

            // Update colors based on velocity
            const color = new THREE.Color();
            for (let i = 0; i < count; i++) {
                const i3 = i * 3;
                const vel = Math.sqrt(
                    simState.velocities[i3] ** 2 +
                    simState.velocities[i3 + 1] ** 2 +
                    simState.velocities[i3 + 2] ** 2
                );

                // Blue = slow, Green = fast, Red = very fast
                const hue = 0.3 - Math.min(vel * 0.3, 0.3);
                color.setHSL(hue, 0.8, 0.5);
                particles.setColorAt(i, color);
            }
            particles.instanceColor.needsUpdate = true;
        }

        // ============================================================
        // UI Updates
        // ============================================================

        function updateStats() {
            const stats = simState.stats;

            document.getElementById('stat-temp').textContent = stats.temperature.toFixed(0) + ' K';
            document.getElementById('stat-ke').textContent = stats.kinetic_energy.toFixed(2);
            document.getElementById('stat-pe').textContent = stats.potential_energy.toFixed(2);
            document.getElementById('stat-total').textContent = stats.total_energy.toFixed(2);
            document.getElementById('stat-step').textContent = simState.step;
            document.getElementById('stat-fps').textContent = fps;
        }

        function updateBrainUI() {
            simState.brain_activity.forEach((val, i) => {
                const bar = document.getElementById(`region-bar-${i}`);
                const valEl = document.getElementById(`region-val-${i}`);

                if (bar) bar.style.width = (val * 100) + '%';
                if (valEl) valEl.textContent = val.toFixed(2);
            });
        }

        // ============================================================
        // Animation Loop
        // ============================================================

        function animate() {
            requestAnimationFrame(animate);

            // FPS calculation
            frameCount++;
            const now = performance.now();
            if (now - lastFrameTime >= 1000) {
                fps = frameCount;
                frameCount = 0;
                lastFrameTime = now;
            }

            // Simulate
            simulateStep();
            updateParticlePositions();

            // Animate food sources
            const time = now * 0.001;
            foodMarkers.forEach((food, i) => {
                const pulse = 1 + Math.sin(time * 2 + i) * 0.1;
                food.mesh.scale.setScalar(pulse);
                food.glow.scale.setScalar(pulse * 1.2);
                food.glow.material.opacity = 0.15 + Math.sin(time * 3 + i) * 0.1;
            });

            // Update controls
            controls.update();

            // Render
            renderer.render(scene, camera);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // Start
        init();
    </script>
</body>
</html>
