name: oNeura CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  CARGO_BUILD_JOBS: 2

jobs:
  check:
    name: Cargo Check
    runs-on: ubuntu-latest
    strategy:
      matrix:
        rust: [stable]
    defaults:
      run:
        working-directory: oneuro-metal
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: oneuro-metal -> target
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libx11-dev libxcursor-dev libxrandr-dev libxinerama-dev libxi-dev
      - name: cargo check
        run: cargo check --no-default-features --lib

  test:
    name: Regression Tests
    runs-on: ubuntu-latest
    needs: check
    strategy:
      matrix:
        rust: [stable]
    defaults:
      run:
        working-directory: oneuro-metal
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: oneuro-metal -> target
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libx11-dev libxcursor-dev libxrandr-dev libxinerama-dev libxi-dev
      - name: Run regression tests
        run: |
          cargo test --no-default-features --lib -- \
            substrate_stays_bounded guild_activity soil_atmosphere \
            terrarium_evolve drosophila_population plant_competition \
            soil_fauna fly_metabolism field_coupling seed_cellular \
            terrarium_world organism_metabolism stochastic cross_scale \
            phenotypic persister bet_hedging benchmark seasonal drought \
            tropical arid spatial zone plant_noise microbial_noise \
            multi_species single_drug pulsed combination protocol ecoli \
            circuit enzyme_ bioremediation probe_coupling probe_snapshot \
            drug_enzyme soil_enzyme temperature_coupling remediation \
            guild_latent landscape_

  build:
    name: Build Binaries
    runs-on: ubuntu-latest
    needs: check
    strategy:
      matrix:
        rust: [stable]
    defaults:
      run:
        working-directory: oneuro-metal
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: oneuro-metal -> target
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libx11-dev libxcursor-dev libxrandr-dev libxinerama-dev libxi-dev
      - name: Build key binaries
        run: |
          cargo build --profile fast --no-default-features \
            --bin terrarium_evolve \
            --bin drug_optimizer \
            --bin gene_circuit \
            --bin terrarium_zoom \
            --bin terrarium_sensitivity \
            --bin terrarium_stress_suite \
            --bin terrarium_profile

  benchmark:
    name: Performance Benchmark
    runs-on: ubuntu-latest
    needs: build
    defaults:
      run:
        working-directory: oneuro-metal
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: oneuro-metal -> target
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libx11-dev libxcursor-dev libxrandr-dev libxinerama-dev libxi-dev
      - name: Build benchmark binaries
        run: |
          cargo build --profile fast --no-default-features \
            --bin terrarium_profile \
            --bin terrarium_sensitivity \
            --bin terrarium_stress_suite
      - name: Run performance profiler (tiny + small scales)
        run: |
          ./target/fast/terrarium_profile --scales tiny,small --frames 20 --csv --output profile_ci.csv
          cat profile_ci.csv
      - name: Run sensitivity smoke test (3 params, low resolution)
        run: |
          ./target/fast/terrarium_sensitivity --param temperature_c --resolution 3 --frames 20
      - name: Run stress suite smoke test (2 scenarios)
        run: |
          ./target/fast/terrarium_stress_suite --scenario drought --scenario heat --frames 30 --lite
      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: oneuro-metal/profile_ci.csv
          retention-days: 30
