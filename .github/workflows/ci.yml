name: oNeura CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  CARGO_BUILD_JOBS: 2

jobs:
  check:
    name: Cargo Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: oneuro-metal
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: oneuro-metal -> target
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libx11-dev libxcursor-dev libxrandr-dev libxinerama-dev libxi-dev
      - name: cargo check
        run: cargo check --no-default-features --lib

  test:
    name: Regression Tests
    runs-on: ubuntu-latest
    needs: check
    defaults:
      run:
        working-directory: oneuro-metal
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: oneuro-metal -> target
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libx11-dev libxcursor-dev libxrandr-dev libxinerama-dev libxi-dev
      - name: Run regression tests (211 tests)
        run: |
          cargo test --no-default-features --lib -- \
            substrate_stays_bounded guild_activity soil_atmosphere \
            terrarium_evolve drosophila_population plant_competition \
            soil_fauna fly_metabolism field_coupling seed_cellular \
            terrarium_world organism_metabolism stochastic cross_scale \
            phenotypic persister bet_hedging benchmark seasonal drought \
            tropical arid spatial zone plant_noise microbial_noise \
            multi_species single_drug pulsed combination protocol ecoli \
            circuit enzyme_ bioremediation probe_coupling probe_snapshot \
            drug_enzyme soil_enzyme temperature_coupling remediation

  build:
    name: Build Binaries
    runs-on: ubuntu-latest
    needs: check
    defaults:
      run:
        working-directory: oneuro-metal
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: oneuro-metal -> target
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libx11-dev libxcursor-dev libxrandr-dev libxinerama-dev libxi-dev
      - name: Build terrarium_evolve
        run: cargo build --profile fast --no-default-features --bin terrarium_evolve
      - name: Build drug_optimizer
        run: cargo build --profile fast --no-default-features --bin drug_optimizer
      - name: Build gene_circuit
        run: cargo build --profile fast --no-default-features --bin gene_circuit

  clippy:
    name: Clippy (Advisory)
    runs-on: ubuntu-latest
    needs: check
    continue-on-error: true
    defaults:
      run:
        working-directory: oneuro-metal
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: oneuro-metal -> target
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libx11-dev libxcursor-dev libxrandr-dev libxinerama-dev libxi-dev
      - name: cargo clippy
        run: cargo clippy --no-default-features --lib -- -W warnings
