<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0f1a"/>
      <stop offset="100%" stop-color="#0d1525"/>
    </linearGradient>
    <linearGradient id="textGlow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="50%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="256" height="256" fill="url(#bgGrad)" rx="24"/>
  <g opacity="0.12" stroke="#10b981" fill="none">
    <circle cx="50" cy="50" r="3" fill="#10b981" opacity="0.4"/>
    <circle cx="206" cy="50" r="3" fill="#06b6d4" opacity="0.4"/>
    <circle cx="50" cy="206" r="3" fill="#3b82f6" opacity="0.4"/>
    <circle cx="206" cy="206" r="3" fill="#10b981" opacity="0.4"/>
    <line x1="50" y1="50" x2="128" y2="100" stroke-width="0.8"/>
    <line x1="206" y1="50" x2="128" y2="100" stroke-width="0.8"/>
    <line x1="50" y1="206" x2="128" y2="156" stroke-width="0.8"/>
    <line x1="206" y1="206" x2="128" y2="156" stroke-width="0.8"/>
  </g>
  <text x="128" y="140"
        font-family="Jacquard 24, cursive"
        font-size="58"
        fill="#10b981"
        text-anchor="middle"
        opacity="0.3"
        filter="url(#softGlow)">
    oNeura
  </text>
  <text x="128" y="140"
        font-family="Jacquard 24, cursive"
        font-size="58"
        fill="url(#textGlow)"
        text-anchor="middle"
        filter="url(#glow)">
    oNeura
  </text>
  <text x="128" y="170"
        font-family="Courier New, monospace"
        font-size="7"
        fill="#6b7280"
        text-anchor="middle"
        letter-spacing="3">
    MULTI-SCALE BIOLOGY
  </text>
</svg>
