<!DOCTYPE html>
<html>
<head>
    <title>Test</title>
    <style>body{margin:0;overflow:hidden;background:#000;}#ui{position:absolute;top:20px;left:20px;color:#fff;font-family:monospace;background:rgba(255,0,0,0.8);padding:20px;}</style>
</head>
<body>
    <div id="ui">Loading...</div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
    document.getElementById('ui').innerHTML = 'JS Loaded!';
    console.log('Starting...');

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xff0000);
    console.log('Scene created');

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 100);
    camera.position.z = 5;

    const renderer = new THREE.WebGLRenderer();
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);
    console.log('Renderer created');

    const geo = new THREE.BoxGeometry();
    const mat = new THREE.MeshBasicMaterial({color: 0x00ff00});
    const cube = new THREE.Mesh(geo, mat);
    scene.add(cube);
    console.log('Cube added');

    function animate() {
        requestAnimationFrame(animate);
        cube.rotation.x += 0.01;
        cube.rotation.y += 0.01;
        renderer.render(scene, camera);
    }
    animate();
    console.log('Animation started');
    </script>
</body>
</html>
