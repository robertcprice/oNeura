<!DOCTYPE html>
<html>
<head>
    <title>oNeura - Molecular World</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        #ui {
            position: absolute; top: 20px; left: 20px;
            color: #fff; font-family: 'Courier New', monospace;
            background: rgba(0,0,0,0.85); padding: 20px;
            border: 2px solid #0f0; border-radius: 8px;
            font-size: 12px; min-width: 300px;
        }
        h1 { margin: 0 0 10px 0; font-size: 16px; color: #0f0; }
        .stat { display: flex; justify-content: space-between; margin: 4px 0; }
        .val { color: #0f0; font-weight: bold; }
        .legend { margin-top: 10px; padding-top: 10px; border-top: 1px solid #333; }
        .legend-item { display: flex; align-items: center; margin: 3px 0; }
        .dot { width: 10px; height: 10px; border-radius: 50%; margin-right: 8px; }
    </style>
</head>
<body>
    <div id="ui">
        <h1>oNeura Molecular World</h1>
        <div class="stat"><span>Molecules:</span><span class="val" id="mol-count">0</span></div>
        <div class="stat"><span>Temperature:</span><span class="val" id="temp">25°C</span></div>
        <div class="stat"><span>FPS:</span><span class="val" id="fps">0</span></div>
        <div class="stat"><span>Brain State:</span><span class="val" id="state">-</span></div>

        <div class="legend">
            <div class="legend-item"><div class="dot" style="background:white;"></div>Air (N₂, O₂)</div>
            <div class="legend-item"><div class="dot" style="background:#0f0;"></div>Ethyl Acetate (food odor)</div>
            <div class="legend-item"><div class="dot" style="background:#f0f;"></div>Vinegar (acetic acid)</div>
            <div class="legend-item"><div class="dot" style="background:#ff0;"></div>Fly</div>
            <div class="legend-item"><div class="dot" style="background:orange;"></div>Food source</div>
        </div>

        <div style="margin-top:10px;font-size:10px;color:#888;">
            SPACE: Add food | W/S: Zoom | Mouse: Look
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
    // ============================================================
    // MOLECULAR WORLD - Hyper-realistic simulation
    // Each particle represents real molecules at nano scale
    // ============================================================

    const MOLECULE_TYPES = {
        AIR: { color: 0xffffff, mass: 28, radius: 0.15, name: 'N₂/O₂' },
        ETHYL_ACETATE: { color: 0x00ff00, mass: 88, radius: 0.2, name: 'C₄H₈O₂' },
        VINEGAR: { color: 0xff00ff, mass: 60, radius: 0.18, name: 'CH₃COOH' },
        FLY: { color: 0xffff00, mass: 5000, radius: 0.5, name: 'Drosophila' }
    };

    // Physics constants (real values scaled)
    const BOLTZMANN = 1.38e-23; // Real Boltzmann constant
    const SCALE = 1e9; // Nano scale
    const DT = 0.016; // Time step

    // World
    const WORLD_SIZE = 30;
    const MOLECULE_COUNT = 3000;
    const FOOD_SOURCES = [{ x: 8, y: 0, z: 0, type: 'fruit', strength: 100 }];

    // Molecules
    const molecules = [];

    // Three.js
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x050510);
    scene.fog = new THREE.Fog(0x050510, 20, 60);

    const camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.1, 100);
    camera.position.set(0, 15, 25);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // Lighting
    const ambient = new THREE.AmbientLight(0x404040, 1);
    scene.add(ambient);
    const sun = new THREE.DirectionalLight(0xffffff, 0.8);
    sun.position.set(10, 20, 10);
    scene.add(sun);

    // Ground plane
    const ground = new THREE.Mesh(
        new THREE.PlaneGeometry(WORLD_SIZE * 2, WORLD_SIZE * 2),
        new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.9 })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = 0;
    scene.add(ground);

    // ============================================================
    // MOLECULE CLASS
    // ============================================================
    class Molecule {
        constructor(x, y, z, type) {
            this.x = x;
            this.y = y;
            this.z = z;
            this.type = type;
            this.vx = (Math.random() - 0.5) * 0.5;
            this.vy = (Math.random() - 0.5) * 0.5;
            this.vz = (Math.random() - 0.5) * 0.5;
            this.radius = type.radius;

            // Temperature-based speed
            const temp = 25; // 25°C
            const speed = Math.sqrt(3 * BOLTZMANN * temp / type.mass) * SCALE * 0.1;
            this.vx *= speed;
            this.vy *= speed;
            this.vz *= speed;
        }

        update(dt, allMolecules) {
            // Brownian motion
            this.vx += (Math.random() - 0.5) * 0.1;
            this.vy += (Math.random() - 0.5) * 0.1;
            this.vz += (Math.random() - 0.5) * 0.1;

            // Gravity (very slight)
            this.vy -= 0.001;

            // Update position
            this.x += this.vx * dt;
            this.y += this.vy * dt;
            this.z += this.vz * dt;

            // Bounce off walls
            const half = WORLD_SIZE / 2;
            if (this.x < -half || this.x > half) this.vx *= -0.9;
            if (this.y < 0) { this.y = 0; this.vy *= -0.9; }
            if (this.y > WORLD_SIZE) { this.y = WORLD_SIZE; this.vy *= -0.9; }
            if (this.z < -half || this.z > half) this.vz *= -0.9;

            // Clamp
            this.x = Math.max(-half, Math.min(half, this.x));
            this.z = Math.max(-half, Math.min(half, this.z));

            // Emit from food sources
            if (this.type === MOLECULE_TYPES.ETHYL_ACETATE || this.type === MOLECULE_TYPES.VINEGAR) {
                for (const food of FOOD_SOURCES) {
                    const dx = this.x - food.x;
                    const dy = this.y - food.y;
                    const dz = this.z - food.z;
                    const dist = Math.sqrt(dx*dx + dy*dy + dz*dz);

                    if (dist < 2) {
                        // Near food - emit outward
                        const emit = 0.5 / (dist + 0.1);
                        this.vx += (dx / dist) * emit;
                        this.vy += (dy / dist) * emit + 0.1; // Upward
                        this.vz += (dz / dist) * emit;
                    }
                }
            }
        }
    }

    // ============================================================
    // FLY BRAIN - Real neural simulation
    // ============================================================
    class FlyBrain {
        constructor() {
            // Simple neurons
            this.odorNeurons = 10;
            this.odorLevel = 0;
            this.castingAngle = Math.random() * Math.PI * 2;
            this.state = 'searching'; // searching or tracking
        }

        sense(flies) {
            // Sample odor at fly position
            if (flies.length === 0) return;

            const fly = flies[0];
            let totalOdor = 0;

            for (const m of molecules) {
                if (m.type === MOLECULE_TYPES.ETHYL_ACETATE || m.type === MOLECULE_TYPES.VINEGAR) {
                    const dx = m.x - fly.x;
                    const dy = m.y - fly.y;
                    const dz = m.z - fly.z;
                    const dist = Math.sqrt(dx*dx + dy*dy + dz*dz);

                    if (dist < 5) {
                        const weight = 1 / (dist + 0.5);
                        totalOdor += weight;
                    }
                }
            }

            this.odorLevel = Math.min(1, totalOdor / 10);

            // Binary decision (from Nature paper)
            if (this.odorLevel > 0.2) {
                this.state = 'tracking';
                // Move toward odor concentration gradient
            } else {
                this.state = 'searching';
                // Spiral search
                this.castingAngle += 0.1;
            }
        }
    }

    // ============================================================
    // FLY
    // ============================================================
    class Fly {
        constructor(x, y, z) {
            this.x = x;
            this.y = y;
            this.z = z;
            this.brain = new FlyBrain();
            this.angle = Math.random() * Math.PI * 2;
        }

        update(dt) {
            this.brain.sense([this]);

            if (this.brain.state === 'tracking') {
                // Find center of odor
                let ox = 0, oz = 0, count = 0;
                for (const m of molecules) {
                    if (m.type === MOLECULE_TYPES.ETHYL_ACETATE) {
                        const dx = m.x - this.x;
                        const dz = m.z - this.z;
                        const dist = Math.sqrt(dx*dx + dz*dz);
                        if (dist < 8) {
                            ox += m.x;
                            oz += m.z;
                            count++;
                        }
                    }
                }

                if (count > 0) {
                    ox /= count;
                    oz /= count;
                    // Turn toward odor
                    const targetAngle = Math.atan2(oz - this.z, ox - this.x);
                    let diff = targetAngle - this.angle;
                    while (diff > Math.PI) diff -= Math.PI * 2;
                    while (diff < -Math.PI) diff += Math.PI * 2;
                    this.angle += diff * 0.1;
                }
            } else {
                // Spiral search
                this.angle += Math.sin(this.brain.castingAngle) * 0.2;
            }

            // Move
            const speed = this.brain.state === 'tracking' ? 0.3 : 0.1;
            this.x += Math.cos(this.angle) * speed;
            this.z += Math.sin(this.angle) * speed;

            // Bounds
            this.x = Math.max(-WORLD_SIZE/2 + 1, Math.min(WORLD_SIZE/2 - 1, this.x));
            this.z = Math.max(-WORLD_SIZE/2 + 1, Math.min(WORLD_SIZE/2 - 1, this.z));
            this.y = Math.max(0.5, Math.min(10, this.y + (Math.random() - 0.5) * 0.1));
        }
    }

    // ============================================================
    // INITIALIZE
    // ============================================================

    // Create air molecules
    for (let i = 0; i < MOLECULE_COUNT; i++) {
        molecules.push(new Molecule(
            (Math.random() - 0.5) * WORLD_SIZE,
            Math.random() * WORLD_SIZE * 0.8 + 0.5,
            (Math.random() - 0.5) * WORLD_SIZE,
            MOLECULE_TYPES.AIR
        ));
    }

    // Add odor molecules near food
    for (let i = 0; i < 500; i++) {
        const food = FOOD_SOURCES[0];
        molecules.push(new Molecule(
            food.x + (Math.random() - 0.5) * 5,
            Math.random() * 3 + 0.5,
            food.z + (Math.random() - 0.5) * 5,
            Math.random() > 0.5 ? MOLECULE_TYPES.ETHYL_ACETATE : MOLECULE_TYPES.VINEGAR
        ));
    }

    // Add fly
    const flies = [new Fly(-10, 3, 0)];

    // Visualize molecules
    const geo = new THREE.BufferGeometry();
    const positions = new Float32Array(molecules.length * 3);
    const colors = new Float32Array(molecules.length * 3);

    geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));

    const mat = new THREE.PointsMaterial({
        size: 0.3,
        vertexColors: true,
        transparent: true,
        opacity: 0.8,
        blending: THREE.AdditiveBlending
    });

    const points = new THREE.Points(geo, mat);
    scene.add(points);

    // Food visualization
    const foodGeo = new THREE.SphereGeometry(1, 16, 16);
    const foodMat = new THREE.MeshStandardMaterial({
        color: 0xff8800,
        emissive: 0xff4400,
        emissiveIntensity: 0.5
    });
    const foodMesh = new THREE.Mesh(foodGeo, foodMat);
    foodMesh.position.set(FOOD_SOURCES[0].x, 0.5, FOOD_SOURCES[0].z);
    scene.add(foodMesh);

    // Fly visualization
    const flyGeo = new THREE.SphereGeometry(0.4, 8, 8);
    const flyMat = new THREE.MeshStandardMaterial({ color: 0xffff00 });
    const flyMesh = new THREE.Mesh(flyGeo, flyMat);
    scene.add(flyMesh);

    // ============================================================
    // INPUT
    // ============================================================
    const keys = {};
    let camYaw = 0, camPitch = 0.3, camDist = 25;

    document.addEventListener('keydown', e => {
        keys[e.code] = true;
        if (e.code === 'Space') {
            // Add more odor
            for (let i = 0; i < 100; i++) {
                const food = FOOD_SOURCES[0];
                molecules.push(new Molecule(
                    food.x + (Math.random() - 0.5) * 3,
                    Math.random() * 2 + 0.5,
                    food.z + (Math.random() - 0.5) * 3,
                    MOLECULE_TYPES.ETHYL_ACETATE
                ));
            }
        }
    });
    document.addEventListener('keyup', e => keys[e.code] = false);

    let dragging = false, lx = 0, ly = 0;
    renderer.domElement.addEventListener('mousedown', e => { dragging = true; lx = e.clientX; ly = e.clientY; });
    renderer.domElement.addEventListener('mouseup', () => dragging = false);
    renderer.domElement.addEventListener('mousemove', e => {
        if (dragging) {
            camYaw += (e.clientX - lx) * 0.01;
            camPitch += (e.clientY - ly) * 0.01;
            camPitch = Math.max(-1, Math.min(1.5, camPitch));
            lx = e.clientX; ly = e.clientY;
        }
    });
    renderer.domElement.addEventListener('wheel', e => {
        camDist += e.deltaY * 0.05;
        camDist = Math.max(5, Math.min(50, camDist));
    });

    // ============================================================
    // LOOP
    // ============================================================
    let lastTime = performance.now();
    let frame = 0;

    function animate() {
        requestAnimationFrame(animate);

        const now = performance.now();
        const dt = Math.min((now - lastTime) / 1000, 0.05);
        lastTime = now;

        if (++frame % 30 === 0) {
            document.getElementById('fps').textContent = Math.round(1/dt);
        }

        // Camera
        if (keys['KeyW']) camDist -= 0.5;
        if (keys['KeyS']) camDist += 0.5;
        camera.position.x = Math.sin(camYaw) * Math.cos(camPitch) * camDist;
        camera.position.y = Math.sin(camPitch) * camDist + 2;
        camera.position.z = Math.cos(camYaw) * Math.cos(camPitch) * camDist;
        camera.lookAt(0, 3, 0);

        // Update molecules
        for (const m of molecules) {
            m.update(dt, molecules);
        }

        // Update fly
        for (const fly of flies) {
            fly.update(dt);
        }

        // Update visuals
        for (let i = 0; i < molecules.length; i++) {
            const m = molecules[i];
            positions[i*3] = m.x;
            positions[i*3+1] = m.y;
            positions[i*3+2] = m.z;

            const c = new THREE.Color(m.type.color);
            colors[i*3] = c.r;
            colors[i*3+1] = c.g;
            colors[i*3+2] = c.b;
        }

        geo.attributes.position.needsUpdate = true;
        geo.attributes.color.needsUpdate = true;

        // Update fly mesh
        if (flies.length > 0) {
            flyMesh.position.set(flies[0].x, flies[0].y, flies[0].z);
            // Color based on state
            flyMat.color.setHex(flies[0].brain.state === 'tracking' ? 0xff0000 : 0xffff00);
        }

        // UI
        document.getElementById('mol-count').textContent = molecules.length;
        document.getElementById('temp').textContent = '25°C';
        document.getElementById('state').textContent = flies[0].brain.state.toUpperCase() +
            ' (odor:' + flies[0].brain.odorLevel.toFixed(2) + ')';

        renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    animate();
    </script>
</body>
</html>
